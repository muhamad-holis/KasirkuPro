name: kasirku
description: Aplikasi Kasir & Manajemen Toko Indonesia
publish_to: 'none'
version: 1.6.0+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ">=2.18.0 <2.19.0"
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  mobile_scanner: ^5.1.1
  image_picker: ^1.1.2
  print_bluetooth_thermal: ^1.0.8
  esc_pos_utils_plus: ^2.0.4
  excel: ^4.0.3
  csv: ^6.0.0
  pdf: ^3.11.0
  open_file: ^3.3.2
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  collection: ^1.18.0
  image: ^4.2.0
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  audioplayers: ^6.0.0
  video_player: ^2.9.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Backup Google Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ">=2.18.0 <2.19.0"
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/logo/
    - assets/icons/menu/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/ic_launcher.png"
  min_sdk_android: 21
