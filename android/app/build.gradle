plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// ── Baca signing properties dari file key.properties ────────
// File ini dibuat otomatis oleh GitHub Actions (tidak di-commit ke repo)
// atau bisa dibuat manual di lokal untuk development
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
// ────────────────────────────────────────────────────────────

android {
    namespace "com.kasirku.app"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // ── Signing Config ───────────────────────────────────────
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            } else {
                // Fallback ke debug signing jika key.properties tidak ada
                // (untuk development lokal tanpa keystore)
                keyAlias "androiddebugkey"
                keyPassword "android"
                storeFile file("${System.properties['user.home']}/.android/debug.keystore")
                storePassword "android"
            }
        }
    }
    // ────────────────────────────────────────────────────────

    defaultConfig {
        applicationId "com.kasirku.app"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release  // ← Gunakan release signing, bukan debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"
    implementation 'androidx.multidex:multidex:2.0.1'
}
